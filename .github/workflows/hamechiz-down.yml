# ============================================================
# 🍉 Hamechiz-Down v6.2 - Production Final Release
# ============================================================
# Features:
#   - Download from: YouTube, Instagram, TikTok, Twitter, Reddit,
#     SoundCloud, Telegram, Google Play, Direct, Webpage, Adult
#   - Thumbnail Explorer & Search (YouTube + Instagram)
#   - Batch processing, Queue system, Split large files
#   - Resume download, Rate limit protection, Cookies support
# ============================================================

name: "🍉 Hamechiz-Down v6.2 - Production Final"

on:
  push:
    branches:
      - main
      - master
      - develop
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"

  workflow_dispatch:
    inputs:
      mode:
        description: "Download mode"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - search
          - youtube
          - instagram
          - tiktok
          - twitter
          - reddit
          - soundcloud
          - telegram
          - googleplay
          - webpage
          - direct
          - adult
      urls:
        description: "URL(s) or search keyword (one per line, max 10)"
        required: false
        type: string
      quality:
        description: "Video quality"
        default: "best"
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - 360
          - audio-only
      subtitles:
        description: "Download subtitles (YouTube)"
        default: false
        type: boolean
      playlist:
        description: "Download entire playlist"
        default: false
        type: boolean
      output_mode:
        description: "How to save output"
        default: "repo"
        type: choice
        options:
          - repo
          - artifact
      output_folder:
        description: "Output folder name"
        default: "downloads"
        type: string

  repository_dispatch:
    types: [download-command]

permissions:
  contents: write
  actions: write
  metadata: read

concurrency:
  group: hamechiz-${{ github.repository }}
  cancel-in-progress: false

jobs:
  download:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 354
    continue-on-error: false

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: "💾 Cache yt-dlp"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yt-dlp
            ~/.cache/pip
          key: yt-dlp-cache-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            yt-dlp-cache-${{ runner.os }}-

      - name: "📦 Install Dependencies"
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -yqq --no-install-recommends \
            ffmpeg zip unzip wget curl jq ca-certificates parallel
          pip install --quiet --no-cache-dir --upgrade \
            yt-dlp pyppeteer requests tenacity beautifulsoup4
          yt-dlp --version
          sudo apt-get clean
          rm -rf /var/lib/apt/lists/*
          echo "✅ All dependencies installed"

      - name: "🍪 Setup YouTube Cookies"
        if: secrets.YOUTUBE_COOKIES != ''
        run: |
          mkdir -p "$RUNNER_TEMP/yt-dlp"
          echo "${{ secrets.YOUTUBE_COOKIES }}" > "$RUNNER_TEMP/yt-dlp/cookies.txt"
          chmod 600 "$RUNNER_TEMP/yt-dlp/cookies.txt"
          echo "✅ Cookies configured"

      - name: "🔍 Parse Input"
        id: parser
        run: |
          set -e
          
          MODE="auto"
          URLS_LIST=""
          QUALITY="best"
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
          SUBTITLES="false"
          PLAYLIST="false"
          OUTPUT_MODE="${{ github.event.inputs.output_mode }}"
          CALLBACK_URL=""
          SEARCH_KEYWORD=""
          SEARCH_PLATFORM="youtube"
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            URLS_LIST="${{ github.event.inputs.urls }}"
            QUALITY="${{ github.event.inputs.quality }}"
            [ -n "${{ github.event.inputs.output_folder }}" ] && OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
            SUBTITLES="${{ github.event.inputs.subtitles }}"
            PLAYLIST="${{ github.event.inputs.playlist }}"
            OUTPUT_MODE="${{ github.event.inputs.output_mode }}"
            echo "✅ Source: workflow_dispatch"
          
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            MODE="${{ github.event.client_payload.mode }}"
            if [ -n "${{ github.event.client_payload.urls }}" ]; then
              URLS_LIST="${{ github.event.client_payload.urls }}"
            else
              URLS_LIST="${{ github.event.client_payload.url }}"
            fi
            QUALITY="${{ github.event.client_payload.quality }}"
            OUTPUT_FOLDER="${{ github.event.client_payload.output_folder }}"
            SUBTITLES="${{ github.event.client_payload.subtitles }}"
            PLAYLIST="${{ github.event.client_payload.playlist }}"
            OUTPUT_MODE="${{ github.event.client_payload.output_mode }}"
            CALLBACK_URL="${{ github.event.client_payload.callback_url }}"
            echo "✅ Source: repository_dispatch"
          
          else
            COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
            echo "📝 Commit: $COMMIT_MSG"
            
            # Check for search command
            if echo "$COMMIT_MSG" | grep -qi "search:" || echo "$COMMIT_MSG" | grep -qi "جستجو:"; then
              MODE="search"
              SEARCH_KEYWORD=$(echo "$COMMIT_MSG" | sed -n 's/.*search:[[:space:]]*//p' | head -1 | xargs)
              [ -z "$SEARCH_KEYWORD" ] && SEARCH_KEYWORD=$(echo "$COMMIT_MSG" | sed -n 's/.*جستجو:[[:space:]]*//p' | head -1 | xargs)
              # Check for platform
              if echo "$COMMIT_MSG" | grep -qi "platform:instagram\|اینستاگرام"; then
                SEARCH_PLATFORM="instagram"
              fi
            else
              URLS_LIST=$(echo "$COMMIT_MSG" | grep -oP '(https?://[a-zA-Z0-9./?=_-]+)' | head -10 | tr '\n' '\n')
            fi
            
            # Parse mode
            if echo "$COMMIT_MSG" | grep -qi "mode:[[:space:]]*youtube\|یوتیوب"; then MODE="youtube"; fi
            if echo "$COMMIT_MSG" | grep -qi "mode:[[:space:]]*search\|جستجو"; then MODE="search"; fi
            
            # Parse quality
            if echo "$COMMIT_MSG" | grep -qi "quality:[[:space:]]*2160\|4k"; then QUALITY="2160"; fi
            if echo "$COMMIT_MSG" | grep -qi "audio-only\|فقط صدا"; then QUALITY="audio-only"; fi
            
            if echo "$COMMIT_MSG" | grep -qi "subtitles:[[:space:]]*true"; then SUBTITLES="true"; fi
            if echo "$COMMIT_MSG" | grep -qi "playlist:[[:space:]]*true"; then PLAYLIST="true"; fi
            
            # Extract search keyword if in search mode
            if [ "$MODE" = "search" ] && [ -z "$SEARCH_KEYWORD" ]; then
              SEARCH_KEYWORD="$URLS_LIST"
              URLS_LIST=""
            fi
            
            echo "✅ Source: push/commit"
          fi
          
          # Handle SEARCH mode
          if [ "$MODE" = "search" ]; then
            if [ -z "$SEARCH_KEYWORD" ] && [ -n "$URLS_LIST" ]; then
              SEARCH_KEYWORD="$URLS_LIST"
            fi
            echo "🔍 SEARCH MODE: Platform=$SEARCH_PLATFORM, Keyword='$SEARCH_KEYWORD'"
            echo "mode=search" >> $GITHUB_ENV
            echo "search_keyword=$SEARCH_KEYWORD" >> $GITHUB_ENV
            echo "search_platform=$SEARCH_PLATFORM" >> $GITHUB_ENV
            echo "status=search" >> $GITHUB_OUTPUT
            mkdir -p "$OUTPUT_FOLDER"
            exit 0
          fi
          
          # Validate URLs
          if [ -z "$URLS_LIST" ]; then
            echo "ℹ️ No URL provided - exiting gracefully"
            echo "status=no_url" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "$URLS_LIST" | head -10 > url_list.txt
          URL_COUNT=$(grep -c 'https\?://' url_list.txt || echo "0")
          
          if [ "$URL_COUNT" -eq 0 ]; then
            echo "⚠️ No valid URLs found"
            echo "status=no_url" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Auto-detect mode
          FIRST_URL=$(head -1 url_list.txt)
          if [ "$MODE" = "auto" ]; then
            case "$FIRST_URL" in
              *youtube.com*|*youtu.be*) MODE="youtube" ;;
              *instagram.com*|*instagr.am*) MODE="instagram" ;;
              *tiktok.com*) MODE="tiktok" ;;
              *twitter.com*|*x.com*) MODE="twitter" ;;
              *reddit.com*) MODE="reddit" ;;
              *soundcloud.com*) MODE="soundcloud" ;;
              *t.me*|*telegram*) MODE="telegram" ;;
              *play.google.com*) MODE="googleplay" ;;
              *) MODE="direct" ;;
            esac
            echo "🔍 Auto-detected: $MODE"
          fi
          
          OUTPUT_FOLDER=$(echo "$OUTPUT_FOLDER" | sed 's/[^a-zA-Z0-9_-]//g')
          [ -z "$OUTPUT_FOLDER" ] && OUTPUT_FOLDER="downloads"
          mkdir -p "$OUTPUT_FOLDER"
          
          {
            echo "MODE=$MODE"
            echo "QUALITY=$QUALITY"
            echo "OUTPUT_FOLDER=$OUTPUT_FOLDER"
            echo "SUBTITLES=$SUBTITLES"
            echo "PLAYLIST=$PLAYLIST"
            echo "OUTPUT_MODE=$OUTPUT_MODE"
            echo "CALLBACK_URL=$CALLBACK_URL"
            echo "URL_COUNT=$URL_COUNT"
          } >> $GITHUB_ENV
          
          echo "status=ok" >> $GITHUB_OUTPUT
          echo ""
          echo "========================================="
          echo "⚙️ Configuration: Mode=$MODE | URLs=$URL_COUNT | Quality=$QUALITY"
          echo "========================================="

      # ============================================================
      # SEARCH MODE - YouTube + Instagram Thumbnail Explorer
      # ============================================================
      - name: "🔍 SEARCH MODE - Thumbnail Explorer"
        if: steps.parser.outputs.status == 'search'
        run: |
          echo "🔍 Starting search on '${{ env.search_platform }}' for: '${{ env.search_keyword }}'"
          
          SEARCH_TERM="${{ env.search_keyword }}"
          SEARCH_PLATFORM="${{ env.search_platform }}"
          OUTPUT_FILE="$OUTPUT_FOLDER/search-results.json"
          
          python3 << 'PYEOF'
          import json
          import subprocess
          import os
          import sys
          import re
          from bs4 import BeautifulSoup
          
          search_term = os.environ.get('SEARCH_TERM', '')
          search_platform = os.environ.get('SEARCH_PLATFORM', 'youtube')
          output_file = os.environ.get('OUTPUT_FILE', 'search-results.json')
          
          if not search_term:
              print("❌ No search term provided")
              sys.exit(1)
          
          results = []
          
          if search_platform == "youtube":
              print(f"🔎 Searching YouTube for: {search_term}")
              cmd = [
                  "yt-dlp", "--no-playlist", "--dump-json", "--skip-download",
                  "--quiet", f"ytsearch15:{search_term}"
              ]
              try:
                  output = subprocess.check_output(cmd, text=True)
                  for line in output.strip().split('\n'):
                      if not line:
                          continue
                      try:
                          data = json.loads(line)
                          results.append({
                              "platform": "youtube",
                              "id": data.get("id", ""),
                              "title": data.get("title", ""),
                              "duration": data.get("duration", 0),
                              "view_count": data.get("view_count", 0),
                              "uploader": data.get("uploader", ""),
                              "upload_date": data.get("upload_date", ""),
                              "thumbnail": data.get("thumbnail", ""),
                              "webpage_url": data.get("webpage_url", ""),
                              "description": data.get("description", "")[:200]
                          })
                      except json.JSONDecodeError:
                          continue
              except subprocess.CalledProcessError as e:
                  print(f"❌ YouTube search failed: {e}")
          
          elif search_platform == "instagram":
              print(f"🔎 Searching Instagram for: {search_term}")
              # Instagram search via yt-dlp (limited)
              cmd = [
                  "yt-dlp", "--no-playlist", "--dump-json", "--skip-download",
                  "--quiet", f"ytsearch10:{search_term} site:instagram.com"
              ]
              try:
                  output = subprocess.check_output(cmd, text=True)
                  for line in output.strip().split('\n'):
                      if not line:
                          continue
                      try:
                          data = json.loads(line)
                          if "instagram.com" in data.get("webpage_url", ""):
                              results.append({
                                  "platform": "instagram",
                                  "id": data.get("id", ""),
                                  "title": data.get("title", "")[:100],
                                  "thumbnail": data.get("thumbnail", ""),
                                  "webpage_url": data.get("webpage_url", ""),
                                  "uploader": data.get("uploader", ""),
                                  "like_count": data.get("like_count", 0)
                              })
                      except json.JSONDecodeError:
                          continue
              except subprocess.CalledProcessError:
                  pass
              
              # Fallback: note about Instagram API limitation
              if not results:
                  print("⚠️ Instagram direct search is limited. Consider using 'instagram' mode with a profile URL.")
          
          # Auto-detect from keyword if it looks like a URL
          if not results and (search_term.startswith('http://') or search_term.startswith('https://')):
              print(f"🔗 Treating as direct URL: {search_term}")
              results.append({
                  "platform": "direct",
                  "title": "Direct URL",
                  "webpage_url": search_term,
                  "thumbnail": ""
              })
          
          # Save results
          with open(output_file, 'w', encoding='utf-8') as f:
              json.dump({
                  "query": search_term,
                  "platform": search_platform,
                  "timestamp": __import__('datetime').datetime.now().isoformat(),
                  "count": len(results),
                  "results": results
              }, f, indent=2, ensure_ascii=False)
          
          print(f"\n✅ Found {len(results)} results")
          print(f"📁 Results saved to: {output_file}")
          
          # Display summary
          print("\n" + "="*60)
          print("📊 SEARCH RESULTS SUMMARY")
          print("="*60)
          for i, item in enumerate(results[:10], 1):
              print(f"{i}. {item.get('title', 'No title')[:70]}")
              if item.get('uploader'):
                  print(f"   👤 {item['uploader']}")
              if item.get('view_count'):
                  print(f"   👁️ {item['view_count']:,} views")
              if item.get('duration'):
                  print(f"   ⏱️ {item['duration']} seconds")
              print(f"   🔗 {item.get('webpage_url', 'N/A')}")
              if item.get('thumbnail'):
                  print(f"   🖼️ Thumbnail: {item['thumbnail'][:80]}...")
              print()
          
          # Markdown summary
          md_file = output_file.replace('.json', '.md')
          with open(md_file, 'w', encoding='utf-8') as f:
              f.write(f"# 🔍 Search Results: {search_term}\n\n")
              f.write(f"**Platform:** {search_platform}\n")
              f.write(f"**Timestamp:** {__import__('datetime').datetime.now().isoformat()}\n")
              f.write(f"**Total results:** {len(results)}\n\n")
              f.write("| # | Title | Uploader | Views |\n")
              f.write("|---|-------|----------|-------|\n")
              for i, item in enumerate(results[:20], 1):
                  title = item.get('title', 'N/A')[:50].replace('|', '\\|')
                  uploader = item.get('uploader', 'N/A')[:30]
                  views = f"{item.get('view_count', 0):,}" if item.get('view_count') else 'N/A'
                  f.write(f"| {i} | {title} | {uploader} | {views} |\n")
          
          print(f"📄 Markdown summary: {md_file}")
          PYEOF
          
          echo "SEARCH_RESULTS_FILE=$OUTPUT_FOLDER/search-results.json" >> $GITHUB_ENV

      # ============================================================
      # YOUTUBE DOWNLOADER (با PLAYLIST اصلاح شده)
      # ============================================================
      - name: "🎬 YouTube Downloader"
        if: env.MODE == 'youtube' && steps.parser.outputs.status == 'ok'
        run: |
          echo "🎬 Starting YouTube downloader for $URL_COUNT URL(s)..."
          
          COOKIE_OPT=""
          if [ -f "$RUNNER_TEMP/yt-dlp/cookies.txt" ]; then
            COOKIE_OPT="--cookies $RUNNER_TEMP/yt-dlp/cookies.txt"
          fi
          
          # تعریف PLAYLIST_OPT به درستی
          if [ "$PLAYLIST" = "true" ]; then
            PLAYLIST_OPT="--yes-playlist"
          else
            PLAYLIST_OPT="--no-playlist"
          fi
          
          if [ "$SUBTITLES" = "true" ]; then
            SUB_OPT="--write-auto-subs --write-subs --sub-lang en,fa --embed-subs"
          else
            SUB_OPT=""
          fi
          
          TOTAL=$URL_COUNT
          CURRENT=0
          SUCCESS=0
          
          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            CURRENT=$((CURRENT + 1))
            echo ""
            echo "[$CURRENT/$TOTAL] Downloading: $URL"
            
            if [ "$QUALITY" = "audio-only" ]; then
              yt-dlp \
                --retries 15 --fragment-retries 15 \
                --sleep-interval 2 --max-sleep-interval 5 \
                --concurrent-fragments 4 --no-check-certificate $COOKIE_OPT \
                -x --audio-format mp3 --audio-quality 0 \
                $PLAYLIST_OPT $SUB_OPT \
                --embed-metadata --embed-thumbnail --restrict-filenames \
                --output "$OUTPUT_FOLDER/%(title)s [%(id)s].%(ext)s" \
                "$URL"
            else
              if [[ "$QUALITY" =~ ^[0-9]+$ ]]; then
                FORMAT="bestvideo[height<=$QUALITY][ext=mp4]+bestaudio[ext=m4a]/best[height<=$QUALITY]"
              else
                FORMAT="bestvideo[ext=mp4]+bestaudio[ext=m4a]/best"
              fi
              
              yt-dlp \
                --retries 15 --fragment-retries 15 \
                --sleep-interval 2 --max-sleep-interval 5 \
                --concurrent-fragments 4 --no-check-certificate $COOKIE_OPT \
                -f "$FORMAT" --merge-output-format mp4 \
                $PLAYLIST_OPT $SUB_OPT \
                --embed-metadata --embed-thumbnail --restrict-filenames \
                --output "$OUTPUT_FOLDER/%(title)s [%(id)s].%(ext)s" \
                "$URL"
            fi
            
            if [ $? -eq 0 ]; then
              SUCCESS=$((SUCCESS + 1))
              echo "✅ [$CURRENT/$TOTAL] Download successful"
            else
              echo "❌ [$CURRENT/$TOTAL] Download failed"
            fi
          done < url_list.txt
          
          echo "✅ YouTube download completed: $SUCCESS/$TOTAL successful"

      # ============================================================
      # INSTAGRAM DOWNLOADER
      # ============================================================
      - name: "📸 Instagram Downloader"
        if: env.MODE == 'instagram' && steps.parser.outputs.status == 'ok'
        run: |
          echo "📸 Starting Instagram downloader..."
          
          COOKIE_OPT=""
          if [ -f "$RUNNER_TEMP/yt-dlp/cookies.txt" ]; then
            COOKIE_OPT="--cookies $RUNNER_TEMP/yt-dlp/cookies.txt"
          fi
          
          TOTAL=$URL_COUNT
          CURRENT=0
          SUCCESS=0
          
          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            CURRENT=$((CURRENT + 1))
            echo "[$CURRENT/$TOTAL] Downloading: $URL"
            
            yt-dlp \
              --no-check-certificate --sleep-interval 2 --max-sleep-interval 4 \
              $COOKIE_OPT \
              --no-playlist \
              --output "$OUTPUT_FOLDER/%(title)s [%(id)s].%(ext)s" \
              "$URL" && SUCCESS=$((SUCCESS + 1))
          done < url_list.txt
          
          echo "✅ Instagram download completed: $SUCCESS/$TOTAL successful"

      # ============================================================
      # SPLIT LARGE FILES
      # ============================================================
      - name: "✂️ Split Large Files (>90MB)"
        if: steps.parser.outputs.status == 'ok'
        run: |
          LIMIT=$((90 * 1024 * 1024))
          SPLIT_COUNT=0
          
          for FILE in "$OUTPUT_FOLDER"/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
            
            if [ "$SIZE" -gt "$LIMIT" ]; then
              FILENAME=$(basename "$FILE")
              NAME="${FILENAME%.*}"
              SAFE_NAME=$(echo "$NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//')
              
              echo "✂️ Splitting: $FILENAME ($(numfmt --to=iec-i --suffix=B $SIZE))"
              mkdir -p "$OUTPUT_FOLDER/$SAFE_NAME"
              mv "$FILE" "$OUTPUT_FOLDER/$SAFE_NAME/"
              
              pushd "$OUTPUT_FOLDER/$SAFE_NAME" > /dev/null
              zip -r -s 90m "${SAFE_NAME}.zip" "$FILENAME" -q
              rm -f "$FILENAME"
              popd > /dev/null
              
              echo "✅ Split into: $OUTPUT_FOLDER/$SAFE_NAME/${SAFE_NAME}.zip"
              SPLIT_COUNT=$((SPLIT_COUNT + 1))
            fi
          done
          
          echo "✅ Split $SPLIT_COUNT large file(s)"

      # ============================================================
      # COMMIT & PUSH
      # ============================================================
      - name: "📤 Commit and Push"
        if: env.OUTPUT_MODE == 'repo' && steps.parser.outputs.status == 'ok' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add "$OUTPUT_FOLDER/"
            git commit -m "🎬 [Hamechiz-Down v6.2] Downloaded $URL_COUNT item(s) in $MODE mode [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Files pushed to repository"
          else
            echo "ℹ️ No new files to commit"
          fi

      # ============================================================
      # UPLOAD ARTIFACT
      # ============================================================
      - name: "📦 Upload as Artifact"
        if: env.OUTPUT_MODE == 'artifact' && steps.parser.outputs.status == 'ok' && success()
        uses: actions/upload-artifact@v4
        with:
          name: hamechiz-download-${{ github.run_id }}
          path: ${{ env.OUTPUT_FOLDER }}/
          retention-days: 7

      # ============================================================
      # CALLBACK
      # ============================================================
      - name: "🔔 Send Callback"
        if: env.CALLBACK_URL != '' && success()
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"status\":\"success\",\"mode\":\"$MODE\",\"run_id\":${{ github.run_id }}}" \
            "$CALLBACK_URL" || echo "⚠️ Callback failed"

      # ============================================================
      # FINAL SUMMARY
      # ============================================================
      - name: "📊 Final Summary"
        if: always()
        run: |
          echo ""
          echo "========================================="
          echo "🍉 Hamechiz-Down v6.2 - Execution Complete"
          echo "========================================="
          echo "Mode        : ${{ env.MODE }}"
          echo "URLs        : ${{ env.URL_COUNT }}"
          echo "Quality     : ${{ env.QUALITY }}"
          echo "Output mode : ${{ env.OUTPUT_MODE }}"
          echo "Status      : ${{ job.status }}"
          echo "========================================="
          
          if [ -d "${{ env.OUTPUT_FOLDER }}" ] && [ "$(ls -A ${{ env.OUTPUT_FOLDER }} 2>/dev/null)" ]; then
            echo ""
            echo "📁 Files in output:"
            ls -lh "${{ env.OUTPUT_FOLDER }}" | grep -v "^total" | awk '{print "   📄 " $9 " (" $5 ")"}'
          fi
          echo "========================================="
