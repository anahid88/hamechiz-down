name: "🍉 Hamechiz-Down v5.2 - Stable Production Release"

on:
  push:
    branches:
      - "main"
      - "master"
      - "develop"

  workflow_dispatch:
    inputs:
      mode:
        description: "Download mode"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - direct
          - youtube
          - telegram
          - instagram
          - soundcloud
          - googleplay
          - webpage
          - adult
      url:
        description: "Target URL"
        required: false
        type: string
      quality:
        description: "Video quality"
        default: "best"
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - 360
          - audio-only
      subtitles:
        description: "Download subtitles"
        default: false
        type: boolean
      playlist:
        description: "Download playlist"
        default: false
        type: boolean
      output_folder:
        description: "Output folder"
        default: "downloads"
        type: string

  repository_dispatch:
    types: [download-command]

permissions:
  contents: write
  actions: read
  metadata: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  downloader:
    runs-on: ubuntu-latest
    timeout-minutes: 354

    steps:
      - name: "🔒 Hardened Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: "📦 Install Tools (Optimized)"
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -yqq --no-install-recommends \
            ffmpeg zip unzip wget curl jq ca-certificates parallel
          pip install --quiet --no-cache-dir --upgrade \
            yt-dlp pyppeteer
          sudo apt-get clean
          rm -rf /var/lib/apt/lists/*
          echo "✅ Tools installed"

      - name: "🍪 Setup Cookies (if available)"
        if: secrets.YOUTUBE_COOKIES != ''
        run: |
          mkdir -p ~/.cache/yt-dlp/youtube
          echo "${{ secrets.YOUTUBE_COOKIES }}" > ~/.cache/yt-dlp/youtube/cookies.txt
          chmod 600 ~/.cache/yt-dlp/youtube/cookies.txt
          echo "✅ Cookies configured"

      - name: "🔍 Parse Input (Unified + Batch Support)"
        id: parser
        run: |
          set -e
          
          MODE="auto"
          URLS=()
          QUALITY="best"
          OUTPUT_FOLDER="downloads"
          SUBTITLES="false"
          PLAYLIST="false"
          CALLBACK_URL=""
          
          # Source detection
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            URLS+=("${{ github.event.inputs.url }}")
            QUALITY="${{ github.event.inputs.quality }}"
            OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
            SUBTITLES="${{ github.event.inputs.subtitles }}"
            PLAYLIST="${{ github.event.inputs.playlist }}"
            echo "📡 Source: workflow_dispatch"
            
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            MODE="${{ github.event.client_payload.mode }}"
            IFS=$'\n' read -d '' -r -a URLS <<< "${{ github.event.client_payload.urls }}" || true
            [ ${#URLS[@]} -eq 0 ] && URLS+=("${{ github.event.client_payload.url }}")
            QUALITY="${{ github.event.client_payload.quality }}"
            OUTPUT_FOLDER="${{ github.event.client_payload.output_folder }}"
            SUBTITLES="${{ github.event.client_payload.subtitles }}"
            PLAYLIST="${{ github.event.client_payload.playlist }}"
            CALLBACK_URL="${{ github.event.client_payload.callback_url }}"
            echo "📡 Source: repository_dispatch"
            
          else
            COMMIT_MSG=$(git log -1 --pretty=%B)
            echo "📝 Commit: $COMMIT_MSG"
            
            # Extract all URLs from commit message (batch support)
            mapfile -t URLS < <(echo "$COMMIT_MSG" | grep -oP '(https?://[a-zA-Z0-9./?=_-]+)' | sort -u)
            
            # Parse parameters
            if echo "$COMMIT_MSG" | grep -qi "mode:[[:space:]]*youtube\|یوتیوب"; then MODE="youtube"; fi
            if echo "$COMMIT_MSG" | grep -qi "mode:[[:space:]]*telegram\|تلگرام"; then MODE="telegram"; fi
            if echo "$COMMIT_MSG" | grep -qi "mode:[[:space:]]*instagram\|اینستاگرام"; then MODE="instagram"; fi
            if echo "$COMMIT_MSG" | grep -qi "mode:[[:space:]]*soundcloud\|ساندکلاد"; then MODE="soundcloud"; fi
            if echo "$COMMIT_MSG" | grep -qi "mode:[[:space:]]*googleplay\|گوگل"; then MODE="googleplay"; fi
            if echo "$COMMIT_MSG" | grep -qi "mode:[[:space:]]*webpage\|آرشیو"; then MODE="webpage"; fi
            if echo "$COMMIT_MSG" | grep -qi "mode:[[:space:]]*direct\|مستقیم"; then MODE="direct"; fi
            
            if echo "$COMMIT_MSG" | grep -qi "quality:[[:space:]]*2160\|4k"; then QUALITY="2160"; fi
            if echo "$COMMIT_MSG" | grep -qi "quality:[[:space:]]*1080"; then QUALITY="1080"; fi
            if echo "$COMMIT_MSG" | grep -qi "quality:[[:space:]]*720"; then QUALITY="720"; fi
            if echo "$COMMIT_MSG" | grep -qi "audio-only\|فقط صدا"; then QUALITY="audio-only"; fi
            
            if echo "$COMMIT_MSG" | grep -qi "subtitles:[[:space:]]*true\|زیرنویس"; then SUBTITLES="true"; fi
            if echo "$COMMIT_MSG" | grep -qi "playlist:[[:space:]]*true\|لیست"; then PLAYLIST="true"; fi
            
            echo "📡 Source: push/commit"
          fi
          
          # Validate URLs
          if [ ${#URLS[@]} -eq 0 ] || [ -z "${URLS[0]}" ]; then
            echo "ℹ️ No URL provided - exiting gracefully"
            echo "status=no_url" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Auto-detect mode if not specified
          if [ "$MODE" = "auto" ]; then
            FIRST_URL="${URLS[0]}"
            if [[ "$FIRST_URL" == *"youtube.com"* ]] || [[ "$FIRST_URL" == *"youtu.be"* ]]; then
              MODE="youtube"
            elif [[ "$FIRST_URL" == *"t.me"* ]] || [[ "$FIRST_URL" == *"telegram"* ]]; then
              MODE="telegram"
            elif [[ "$FIRST_URL" == *"instagram.com"* ]] || [[ "$FIRST_URL" == *"instagr.am"* ]]; then
              MODE="instagram"
            elif [[ "$FIRST_URL" == *"soundcloud.com"* ]]; then
              MODE="soundcloud"
            elif [[ "$FIRST_URL" == *"play.google.com"* ]]; then
              MODE="googleplay"
            elif [[ "$FIRST_URL" =~ \.(mp4|mkv|avi|mov|mp3|zip|rar|pdf|jpg|png|webm)$ ]]; then
              MODE="direct"
            else
              MODE="webpage"
            fi
            echo "🔍 Auto-detected: $MODE"
          fi
          
          # Sanitize output folder
          OUTPUT_FOLDER=$(echo "$OUTPUT_FOLDER" | sed 's/[^a-zA-Z0-9_-]//g')
          [ -z "$OUTPUT_FOLDER" ] && OUTPUT_FOLDER="downloads"
          
          mkdir -p "$OUTPUT_FOLDER"
          
          # Save URLs to file for batch processing
          printf "%s\n" "${URLS[@]}" > url_list.txt
          
          {
            echo "MODE=$MODE"
            echo "QUALITY=$QUALITY"
            echo "OUTPUT_FOLDER=$OUTPUT_FOLDER"
            echo "SUBTITLES=$SUBTITLES"
            echo "PLAYLIST=$PLAYLIST"
            echo "CALLBACK_URL=$CALLBACK_URL"
            echo "URL_COUNT=${#URLS[@]}"
          } >> $GITHUB_ENV
          
          echo "status=ok" >> $GITHUB_OUTPUT
          echo "✅ Mode: $MODE | URLs: ${#URLS[@]} | Quality: $QUALITY"

      # ==================== YOUTUBE (با بهبودهای v5.2) ====================
      - name: "🎬 YouTube Downloader"
        if: env.MODE == 'youtube' && steps.parser.outputs.status != 'no_url'
        run: |
          CMD="yt-dlp \
            --retries 15 \
            --fragment-retries 15 \
            --sleep-interval 2 \
            --max-sleep-interval 5 \
            --concurrent-fragments 4 \
            --no-check-certificate"
          
          if [ -f ~/.cache/yt-dlp/youtube/cookies.txt ]; then
            CMD="$CMD --cookies ~/.cache/yt-dlp/youtube/cookies.txt"
          fi
          
          if [ "$QUALITY" = "audio-only" ]; then
            CMD="$CMD -x --audio-format mp3 --audio-quality 0"
          else
            if [[ "$QUALITY" =~ ^[0-9]+$ ]]; then
              CMD="$CMD -f \"bestvideo[height<=$QUALITY][ext=mp4]+bestaudio[ext=m4a]/best[height<=$QUALITY]\" --merge-output-format mp4"
            else
              CMD="$CMD -f \"bestvideo[ext=mp4]+bestaudio[ext=m4a]/best\" --merge-output-format mp4"
            fi
          fi
          
          if [ "$SUBTITLES" = "true" ]; then
            CMD="$CMD --write-auto-subs --write-subs --sub-lang en,fa --embed-subs"
          fi
          
          if [ "$PLAYLIST" = "true" ]; then
            CMD="$CMD --yes-playlist"
          else
            CMD="$CMD --no-playlist"
          fi
          
          CMD="$CMD --embed-metadata --embed-thumbnail --restrict-filenames"
          CMD="$CMD --output \"$OUTPUT_FOLDER/%(title)s [%(id)s].%(ext)s\""
          
          # Batch processing for multiple URLs
          TOTAL=${URL_COUNT}
          CURRENT=0
          
          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            CURRENT=$((CURRENT + 1))
            echo "🚀 [$CURRENT/$TOTAL] Downloading from YouTube: $URL"
            eval "$CMD \"$URL\""
          done < url_list.txt
          
          echo "✅ YouTube download completed for $TOTAL URL(s)"

      # ==================== DIRECT (با قابلیت Resume) ====================
      - name: "📥 Direct Download"
        if: env.MODE == 'direct' && steps.parser.outputs.status != 'no_url'
        run: |
          TOTAL=${URL_COUNT}
          CURRENT=0
          
          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            CURRENT=$((CURRENT + 1))
            echo "📥 [$CURRENT/$TOTAL] Downloading: $URL"
            
            cd "$OUTPUT_FOLDER"
            FILENAME=$(basename "$URL" | cut -d'?' -f1)
            [ -z "$FILENAME" ] && FILENAME="downloaded_$(date +%Y%m%d_%H%M%S)_${CURRENT}"
            
            wget -c --no-check-certificate \
                 --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                 --tries=10 \
                 --timeout=60 \
                 --progress=bar:force \
                 -O "$FILENAME" \
                 "$URL"
                 
            cd ..
          done < url_list.txt
          
          echo "✅ Direct download completed for $TOTAL URL(s)"

      # ==================== INSTAGRAM ====================
      - name: "📸 Instagram Downloader"
        if: env.MODE == 'instagram' && steps.parser.outputs.status != 'no_url'
        run: |
          TOTAL=${URL_COUNT}
          CURRENT=0
          
          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            CURRENT=$((CURRENT + 1))
            echo "📸 [$CURRENT/$TOTAL] Downloading from Instagram: $URL"
            
            yt-dlp \
              --no-check-certificate \
              --sleep-interval 2 \
              --max-sleep-interval 5 \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              --no-playlist \
              --output "$OUTPUT_FOLDER/%(title)s [%(id)s].%(ext)s" \
              "$URL"
          done < url_list.txt
          
          echo "✅ Instagram download completed for $TOTAL URL(s)"

      # ==================== SOUNDCLOUD ====================
      - name: "🎵 SoundCloud Downloader"
        if: env.MODE == 'soundcloud' && steps.parser.outputs.status != 'no_url'
        run: |
          TOTAL=${URL_COUNT}
          CURRENT=0
          
          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            CURRENT=$((CURRENT + 1))
            echo "🎵 [$CURRENT/$TOTAL] Downloading from SoundCloud: $URL"
            
            yt-dlp \
              --no-check-certificate \
              --sleep-interval 2 \
              --max-sleep-interval 5 \
              -x --audio-format mp3 --audio-quality 0 \
              --output "$OUTPUT_FOLDER/%(title)s.%(ext)s" \
              "$URL"
          done < url_list.txt
          
          echo "✅ SoundCloud download completed for $TOTAL URL(s)"

      # ==================== TELEGRAM ====================
      - name: "📱 Telegram Downloader"
        if: env.MODE == 'telegram' && steps.parser.outputs.status != 'no_url'
        run: |
          TOTAL=${URL_COUNT}
          CURRENT=0
          
          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            CURRENT=$((CURRENT + 1))
            echo "📱 [$CURRENT/$TOTAL] Downloading from Telegram: $URL"
            
            cd "$OUTPUT_FOLDER"
            python3 << 'EOF'
            import re, requests, os, sys
            url = os.environ.get('URL', '')
            
            if url.endswith(('.mp4', '.mkv', '.jpg', '.png', '.mp3')):
                filename = url.split('/')[-1].split('?')[0]
                r = requests.get(url, stream=True)
                with open(filename, 'wb') as f:
                    for chunk in r.iter_content(8192):
                        f.write(chunk)
                print(f"✅ Downloaded: {filename}")
                sys.exit(0)
            
            match = re.search(r't\.me/([^/]+)/(\d+)', url)
            if match:
                channel, post_id = match.group(1), match.group(2)
                api_url = f"https://tg-bot-api.vercel.app/dl?url={url}"
                try:
                    resp = requests.get(api_url, timeout=30)
                    if resp.status_code == 200 and resp.json().get('file_url'):
                        file_url = resp.json()['file_url']
                        filename = f"telegram_{channel}_{post_id}.mp4"
                        r = requests.get(file_url, stream=True)
                        with open(filename, 'wb') as f:
                            for chunk in r.iter_content(8192):
                                f.write(chunk)
                        print(f"✅ Downloaded: {filename}")
                    else:
                        print(f"⚠️ Could not download: {url}")
                except Exception as e:
                    print(f"⚠️ Error: {e}")
            EOF
            cd ..
          done < url_list.txt

      # ==================== GOOGLE PLAY ====================
      - name: "🛍️ Google Play APK Downloader"
        if: env.MODE == 'googleplay' && steps.parser.outputs.status != 'no_url'
        run: |
          TOTAL=${URL_COUNT}
          CURRENT=0
          
          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            CURRENT=$((CURRENT + 1))
            echo "🛍️ [$CURRENT/$TOTAL] Downloading APK: $URL"
            
            PACKAGE=$(echo "$URL" | grep -oP 'id=\K[^&]+')
            cd "$OUTPUT_FOLDER"
            wget -c --no-check-certificate \
                 "https://apkpure.net/api/v1/app/$PACKAGE/download" \
                 -O "${PACKAGE}.apk"
            cd ..
          done < url_list.txt

      # ==================== WEBPAGE ARCHIVE ====================
      - name: "🌐 Webpage Archive (MHTML)"
        if: env.MODE == 'webpage' && steps.parser.outputs.status != 'no_url'
        run: |
          cat > save_mhtml.py << 'PYEOF'
          import asyncio, base64, os, sys
          from pyppeteer import launch
          
          async def save_page(url, output_path):
              browser = await launch(headless=True, args=['--no-sandbox', '--disable-setuid-sandbox'])
              try:
                  page = await browser.newPage()
                  await page.setViewport({'width': 1920, 'height': 1080})
                  await page.goto(url, {'waitUntil': 'networkidle2', 'timeout': 60000})
                  await asyncio.sleep(2)
                  cdp = await page.target.createCDPSession()
                  mhtml = await cdp.send('Page.captureSnapshot')
                  with open(output_path, 'wb') as f:
                      f.write(base64.b64decode(mhtml['data']))
                  print(f"✅ Archived: {output_path}")
                  return True
              except Exception as e:
                  print(f"❌ Error: {e}")
                  return False
              finally:
                  await browser.close()
          
          async def main():
              url = os.environ.get('URL')
              idx = os.environ.get('CURRENT', '1')
              output = f"{os.environ['OUTPUT_FOLDER']}/webpage_{idx}_{int(asyncio.get_event_loop().time())}.mhtml"
              await save_page(url, output)
          
          asyncio.run(main())
          PYEOF
          
          TOTAL=${URL_COUNT}
          CURRENT=0
          
          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            CURRENT=$((CURRENT + 1))
            echo "🌐 [$CURRENT/$TOTAL] Archiving: $URL"
            export URL="$URL"
            export CURRENT="$CURRENT"
            export OUTPUT_FOLDER="$OUTPUT_FOLDER"
            python3 save_mhtml.py
          done < url_list.txt

      # ==================== SPLIT LARGE FILES (Fixed) ====================
      - name: "✂️ Split Large Files (>90MB)"
        if: steps.parser.outputs.status != 'no_url'
        run: |
          LIMIT=$((90 * 1024 * 1024))
          SPLIT_COUNT=0
          
          for FILE in "$OUTPUT_FOLDER"/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            
            if [ "$SIZE" -gt "$LIMIT" ]; then
              FILENAME=$(basename "$FILE")
              NAME="${FILENAME%.*}"
              SAFE_NAME=$(echo "$NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//')
              
              mkdir -p "$OUTPUT_FOLDER/$SAFE_NAME"
              mv "$FILE" "$OUTPUT_FOLDER/$SAFE_NAME/"
              
              pushd "$OUTPUT_FOLDER/$SAFE_NAME" > /dev/null
              zip -s 90m -r "${SAFE_NAME}.zip" "$FILENAME" -q
              rm -f "$FILENAME"
              popd > /dev/null
              
              echo "✅ Split: $FILENAME → $OUTPUT_FOLDER/$SAFE_NAME/"
              SPLIT_COUNT=$((SPLIT_COUNT + 1))
            fi
          done
          
          echo "✅ Processed $SPLIT_COUNT large file(s)"

      # ==================== CHECK REPOSITORY SIZE ====================
      - name: "📊 Check Repository Size"
        if: steps.parser.outputs.status != 'no_url'
        run: |
          REPO_SIZE=$(du -sb . | cut -f1)
          LIMIT=$((4 * 1024 * 1024 * 1024))  # 4GB limit
          
          if [ "$REPO_SIZE" -gt "$LIMIT" ]; then
            echo "⚠️ WARNING: Repository size ($(numfmt --to=iec $REPO_SIZE)) exceeds GitHub limit!"
            echo "💡 Consider using artifacts or releases for large files"
          else
            echo "✅ Repository size: $(numfmt --to=iec $REPO_SIZE) / 4GB"
          fi

      # ==================== COMMIT & PUSH ====================
      - name: "📤 Commit and Push"
        if: steps.parser.outputs.status != 'no_url' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add "$OUTPUT_FOLDER/"
            git commit -m "🎬 [Hamechiz-Down v5.2] Downloaded ${URL_COUNT} item(s) in ${MODE} mode - $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Files pushed to repository"
          else
            echo "ℹ️ No files to commit"
          fi

      # ==================== CALLBACK ====================
      - name: "🔔 Send Callback"
        if: env.CALLBACK_URL != '' && success()
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"success\",\"mode\":\"$MODE\",\"folder\":\"$OUTPUT_FOLDER\",\"count\":$URL_COUNT,\"timestamp\":\"$(date -Iseconds)\"}" \
            "$CALLBACK_URL" || echo "⚠️ Callback failed"

      # ==================== SUMMARY ====================
      - name: "📊 Summary"
        if: always()
        run: |
          echo ""
          echo "========================================="
          echo "🍉 Hamechiz-Down v5.2 - Execution Complete"
          echo "========================================="
          echo "Mode          : $MODE"
          echo "URLs Count    : ${URL_COUNT:-0}"
          echo "Output Folder : $OUTPUT_FOLDER"
          echo "Status        : ${{ job.status }}"
          echo "Timestamp     : $(date)"
          echo "========================================="
          
          if [ -d "$OUTPUT_FOLDER" ] && [ "$(ls -A $OUTPUT_FOLDER 2>/dev/null)" ]; then
            echo ""
            echo "📁 Files in output:"
            ls -lh "$OUTPUT_FOLDER/" | grep -v "^total" | awk '{print "   " $9 " (" $5 ")"}'
          fi
          echo "========================================="
