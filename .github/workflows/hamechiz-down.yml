# ============================================================
# 🍉 Hamechiz-Down v6.3 - Stable Production Release
# ============================================================
# Features:
#   - Download from 11+ platforms
#   - Search Mode (YouTube + Instagram hashtag)
#   - Thumbnail Explorer with JSON + HTML Gallery
#   - GitHub Pages preview support
#   - Production-ready, fully tested
# ============================================================

name: "🍉 Hamechiz-Down v6.3 - Stable Production"

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"

  workflow_dispatch:
    inputs:
      mode:
        description: "Download mode"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - search
          - youtube
          - instagram
          - tiktok
          - twitter
          - reddit
          - soundcloud
          - telegram
          - googleplay
          - webpage
          - direct
      urls:
        description: "URL(s) or search keyword"
        required: false
        type: string
      quality:
        description: "Video quality"
        default: "best"
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - 360
          - audio-only
      subtitles:
        description: "Download subtitles (YouTube)"
        default: false
        type: boolean
      playlist:
        description: "Download entire playlist"
        default: false
        type: boolean
      output_mode:
        description: "How to save output"
        default: "repo"
        type: choice
        options:
          - repo
          - artifact
      output_folder:
        description: "Output folder name"
        default: "downloads"
        type: string

  repository_dispatch:
    types: [download-command]

permissions:
  contents: write
  actions: write
  #metadata: read

concurrency:
  group: hamechiz-${{ github.repository }}
  cancel-in-progress: false

jobs:
  download:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 354

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: "💾 Cache yt-dlp"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yt-dlp
            ~/.cache/pip
          key: yt-dlp-cache-${{ runner.os }}-v1
          restore-keys: |
            yt-dlp-cache-${{ runner.os }}-

      - name: "📦 Install Dependencies"
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -yqq --no-install-recommends \
            ffmpeg zip unzip wget curl jq ca-certificates
          pip install --quiet --no-cache-dir --upgrade \
            yt-dlp pyppeteer requests tenacity
          echo "✅ Ready"

      #- name: "🍪 Setup Cookies"
       # if: secrets.YOUTUBE_COOKIES != ''
        #run: |
         # mkdir -p "$RUNNER_TEMP/yt-dlp"
          #echo "${{ secrets.YOUTUBE_COOKIES }}" > "$RUNNER_TEMP/yt-dlp/cookies.txt"
          #chmod 600 "$RUNNER_TEMP/yt-dlp/cookies.txt"

      # ============================================================
      # PARSER - کاملاً بازنویسی شده
      # ============================================================
      - name: "🔍 Parse Input"
        id: parser
        run: |
          MODE="auto"
          URLS_LIST=""
          QUALITY="best"
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
          SUBTITLES="false"
          PLAYLIST="false"
          OUTPUT_MODE="${{ github.event.inputs.output_mode }}"
          CALLBACK_URL=""
          SEARCH_KEYWORD=""
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            URLS_LIST="${{ github.event.inputs.urls }}"
            QUALITY="${{ github.event.inputs.quality }}"
            [ -n "${{ github.event.inputs.output_folder }}" ] && OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
            SUBTITLES="${{ github.event.inputs.subtitles }}"
            PLAYLIST="${{ github.event.inputs.playlist }}"
            OUTPUT_MODE="${{ github.event.inputs.output_mode }}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            MODE="${{ github.event.client_payload.mode }}"
            URLS_LIST="${{ github.event.client_payload.url }}"
            [ -n "${{ github.event.client_payload.urls }}" ] && URLS_LIST="${{ github.event.client_payload.urls }}"
            QUALITY="${{ github.event.client_payload.quality }}"
            OUTPUT_FOLDER="${{ github.event.client_payload.output_folder }}"
            SUBTITLES="${{ github.event.client_payload.subtitles }}"
            PLAYLIST="${{ github.event.client_payload.playlist }}"
            OUTPUT_MODE="${{ github.event.client_payload.output_mode }}"
            CALLBACK_URL="${{ github.event.client_payload.callback_url }}"
          else
            COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
            if echo "$COMMIT_MSG" | grep -qi "^search:"; then
              MODE="search"
              SEARCH_KEYWORD=$(echo "$COMMIT_MSG" | sed 's/^search:[[:space:]]*//' | head -1 | xargs)
            elif echo "$COMMIT_MSG" | grep -qi "mode:[[:space:]]*search"; then
              MODE="search"
              SEARCH_KEYWORD=$(echo "$COMMIT_MSG" | grep -oP '(?<=search:)[^|]+' | head -1 | xargs)
            else
              URLS_LIST=$(echo "$COMMIT_MSG" | grep -oE 'https?://[^ ]+' | head -10 | tr '\n' '\n')
            fi
            
            if echo "$COMMIT_MSG" | grep -qi "youtube\|یوتیوب"; then MODE="youtube"; fi
            if echo "$COMMIT_MSG" | grep -qi "instagram\|اینستاگرام"; then MODE="instagram"; fi
            if echo "$COMMIT_MSG" | grep -qi "quality:[[:space:]]*1080"; then QUALITY="1080"; fi
            if echo "$COMMIT_MSG" | grep -qi "audio-only"; then QUALITY="audio-only"; fi
            if echo "$COMMIT_MSG" | grep -qi "subtitles:[[:space:]]*true"; then SUBTITLES="true"; fi
            if echo "$COMMIT_MSG" | grep -qi "playlist:[[:space:]]*true"; then PLAYLIST="true"; fi
          fi
          
          # SEARCH mode handling
          if [ "$MODE" = "search" ]; then
            if [ -z "$SEARCH_KEYWORD" ] && [ -n "$URLS_LIST" ]; then
              SEARCH_KEYWORD="$URLS_LIST"
            fi
            echo "mode=search" >> $GITHUB_ENV
            echo "search_keyword=$SEARCH_KEYWORD" >> $GITHUB_ENV
            echo "status=search" >> $GITHUB_OUTPUT
            mkdir -p "$OUTPUT_FOLDER"
            exit 0
          fi
          
          # Download mode
          if [ -z "$URLS_LIST" ]; then
            echo "status=no_url" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "$URLS_LIST" | head -10 > url_list.txt
          URL_COUNT=$(grep -c 'https\?://' url_list.txt || echo "0")
          
          if [ "$URL_COUNT" -eq 0 ]; then
            echo "status=no_url" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Auto-detect
          FIRST_URL=$(head -1 url_list.txt)
          if [ "$MODE" = "auto" ]; then
            case "$FIRST_URL" in
              *youtube.com*|*youtu.be*) MODE="youtube" ;;
              *instagram.com*) MODE="instagram" ;;
              *tiktok.com*) MODE="tiktok" ;;
              *twitter.com*|*x.com*) MODE="twitter" ;;
              *soundcloud.com*) MODE="soundcloud" ;;
              *t.me*) MODE="telegram" ;;
              *play.google.com*) MODE="googleplay" ;;
              *) MODE="direct" ;;
            esac
          fi
          
          OUTPUT_FOLDER=$(echo "$OUTPUT_FOLDER" | sed 's/[^a-zA-Z0-9_-]//g')
          [ -z "$OUTPUT_FOLDER" ] && OUTPUT_FOLDER="downloads"
          mkdir -p "$OUTPUT_FOLDER"
          
          {
            echo "MODE=$MODE"
            echo "QUALITY=$QUALITY"
            echo "OUTPUT_FOLDER=$OUTPUT_FOLDER"
            echo "SUBTITLES=$SUBTITLES"
            echo "PLAYLIST=$PLAYLIST"
            echo "OUTPUT_MODE=$OUTPUT_MODE"
            echo "CALLBACK_URL=$CALLBACK_URL"
            echo "URL_COUNT=$URL_COUNT"
          } >> $GITHUB_ENV
          
          echo "status=ok" >> $GITHUB_OUTPUT
          echo "✅ Mode: $MODE | URLs: $URL_COUNT"

      # ============================================================
      # SEARCH MODE - با Instagram Real Search
      # ============================================================
      - name: "🔍 Search Mode - Thumbnail Explorer"
        if: steps.parser.outputs.status == 'search'
        run: |
          # Export variables properly
          export SEARCH_KEYWORD="${{ env.search_keyword }}"
          export OUTPUT_FOLDER="${{ env.OUTPUT_FOLDER }}"
          
          echo "🔍 Searching for: '$SEARCH_KEYWORD'"
          
          python3 << 'PYEOF'
          import json
          import subprocess
          import os
          import sys
          import re
          import time
          
          search_term = os.environ.get('SEARCH_KEYWORD', '')
          output_folder = os.environ.get('OUTPUT_FOLDER', 'downloads')
          
          if not search_term:
              print("❌ No search term")
              sys.exit(0)
          
          results = []
          
          # YouTube Search (real)
          print(f"🔎 Searching YouTube...")
          try:
              cmd = ["yt-dlp", "--no-playlist", "--dump-json", "--skip-download", 
                     "--quiet", f"ytsearch10:{search_term}"]
              output = subprocess.check_output(cmd, text=True, timeout=60)
              for line in output.strip().split('\n'):
                  if not line:
                      continue
                  try:
                      data = json.loads(line)
                      results.append({
                          "platform": "youtube",
                          "id": data.get("id", ""),
                          "title": data.get("title", "")[:100],
                          "duration": data.get("duration", 0),
                          "views": data.get("view_count", 0),
                          "uploader": data.get("uploader", ""),
                          "thumbnail": data.get("thumbnail", ""),
                          "url": data.get("webpage_url", "")
                      })
                  except:
                      pass
          except Exception as e:
              print(f"⚠️ YouTube search error: {e}")
          
          # Instagram Hashtag Search
          if search_term.startswith('#'):
              hashtag = search_term[1:]
              print(f"🔎 Searching Instagram hashtag: #{hashtag}")
              
              # Build Instagram hashtag URL
              insta_url = f"https://www.instagram.com/explore/tags/{hashtag}/"
              
              # Use yt-dlp to extract from hashtag page
              try:
                  cmd = ["yt-dlp", "--dump-json", "--skip-download", "--quiet",
                         "--playlist-end", "10", insta_url]
                  output = subprocess.check_output(cmd, text=True, timeout=90)
                  for line in output.strip().split('\n'):
                      if not line:
                          continue
                      try:
                          data = json.loads(line)
                          if data.get("extractor", "") == "instagram":
                              results.append({
                                  "platform": "instagram",
                                  "id": data.get("id", ""),
                                  "title": data.get("title", "")[:80],
                                  "thumbnail": data.get("thumbnail", ""),
                                  "url": data.get("webpage_url", ""),
                                  "uploader": data.get("uploader", "")
                              })
                      except:
                          pass
              except Exception as e:
                  print(f"⚠️ Instagram search error: {e}")
          
          # Save JSON
          os.makedirs(output_folder, exist_ok=True)
          json_file = f"{output_folder}/search-results.json"
          with open(json_file, 'w', encoding='utf-8') as f:
              json.dump({
                  "query": search_term,
                  "timestamp": time.strftime("%Y-%m-%d %H:%M:%S"),
                  "count": len(results),
                  "results": results
              }, f, indent=2, ensure_ascii=False)
          
          # Generate HTML Gallery
          html_file = f"{output_folder}/gallery.html"
          with open(html_file, 'w', encoding='utf-8') as f:
              f.write(f"""<!DOCTYPE html>
              <html>
              <head><title>Search: {search_term}</title>
              <style>
                body {{ font-family: Arial; max-width: 1200px; margin: auto; padding: 20px; }}
                .card {{ border: 1px solid #ddd; border-radius: 8px; margin: 10px; padding: 10px; display: inline-block; width: 300px; vertical-align: top; }}
                .card img {{ width: 100%; border-radius: 4px; }}
                .title {{ font-weight: bold; margin: 8px 0; }}
                .meta {{ color: #666; font-size: 12px; }}
                a {{ text-decoration: none; color: #333; }}
                .platform {{ display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; }}
                .youtube {{ background: #ff0000; color: white; }}
                .instagram {{ background: #e4405f; color: white; }}
              </style>
              </head>
              <body>
              <h1>🔍 Search Results: {search_term}</h1>
              <p>📅 {time.strftime('%Y-%m-%d %H:%M:%S')} | 📊 {len(results)} results</p>
              <hr>""")
              
              for item in results:
                  platform_class = "youtube" if item['platform'] == 'youtube' else "instagram"
                  f.write(f"""
              <div class="card">
                <span class="platform {platform_class}">{item['platform'].upper()}</span>
                <img src="{item.get('thumbnail', '')}" onerror="this.src='https://via.placeholder.com/300x200?text=No+Thumbnail'">
                <div class="title"><a href="{item['url']}" target="_blank">{item['title'][:60]}</a></div>
                <div class="meta">👤 {item.get('uploader', 'Unknown')}</div>
                {f'<div class="meta">👁️ {item.get("views", 0):,} views | ⏱️ {item.get("duration", 0)}s</div>' if item.get('views') else ''}
              </div>""")
              
              f.write("</body></html>")
          
          print(f"\n✅ Results: {len(results)}")
          print(f"📄 JSON: {json_file}")
          print(f"🌐 HTML Gallery: {html_file}")
          PYEOF
          
          echo "SEARCH_RESULTS_FILE=${{ env.OUTPUT_FOLDER }}/search-results.json" >> $GITHUB_ENV
          echo "SEARCH_HTML_FILE=${{ env.OUTPUT_FOLDER }}/gallery.html" >> $GITHUB_ENV

      # ============================================================
      # YOUTUBE DOWNLOADER (اصلاح شده)
      # ============================================================
      - name: "🎬 YouTube Downloader"
        if: env.MODE == 'youtube' && steps.parser.outputs.status == 'ok'
        run: |
          COOKIE_OPT=""
          [ -f "$RUNNER_TEMP/yt-dlp/cookies.txt" ] && COOKIE_OPT="--cookies $RUNNER_TEMP/yt-dlp/cookies.txt"
          
          if [ "$PLAYLIST" = "true" ]; then
            PLAYLIST_OPT="--yes-playlist"
          else
            PLAYLIST_OPT="--no-playlist"
          fi
          
          SUB_OPT=""
          [ "$SUBTITLES" = "true" ] && SUB_OPT="--write-auto-subs --write-subs --sub-lang en,fa --embed-subs"
          
          TOTAL=$URL_COUNT
          CURRENT=0
          SUCCESS=0
          
          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            CURRENT=$((CURRENT + 1))
            echo "[$CURRENT/$TOTAL] $URL"
            
            if [ "$QUALITY" = "audio-only" ]; then
              yt-dlp --retries 15 --fragment-retries 15 --sleep-interval 2 \
                --max-sleep-interval 5 --no-check-certificate $COOKIE_OPT \
                -x --audio-format mp3 --audio-quality 0 $PLAYLIST_OPT $SUB_OPT \
                --embed-metadata --embed-thumbnail --restrict-filenames \
                --output "$OUTPUT_FOLDER/%(title)s [%(id)s].%(ext)s" "$URL" && SUCCESS=$((SUCCESS + 1))
            else
              FORMAT="bestvideo[ext=mp4]+bestaudio[ext=m4a]/best"
              [[ "$QUALITY" =~ ^[0-9]+$ ]] && FORMAT="bestvideo[height<=$QUALITY][ext=mp4]+bestaudio[ext=m4a]/best[height<=$QUALITY]"
              
              yt-dlp --retries 15 --fragment-retries 15 --sleep-interval 2 \
                --max-sleep-interval 5 --no-check-certificate $COOKIE_OPT \
                -f "$FORMAT" --merge-output-format mp4 $PLAYLIST_OPT $SUB_OPT \
                --embed-metadata --embed-thumbnail --restrict-filenames \
                --output "$OUTPUT_FOLDER/%(title)s [%(id)s].%(ext)s" "$URL" && SUCCESS=$((SUCCESS + 1))
            fi
          done < url_list.txt
          
          echo "✅ YouTube: $SUCCESS/$TOTAL successful"

      # ============================================================
      # INSTAGRAM DOWNLOADER
      # ============================================================
      - name: "📸 Instagram Downloader"
        if: env.MODE == 'instagram' && steps.parser.outputs.status == 'ok'
        run: |
          TOTAL=$URL_COUNT
          CURRENT=0
          SUCCESS=0
          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            CURRENT=$((CURRENT + 1))
            yt-dlp --no-check-certificate --sleep-interval 2 --no-playlist \
              --output "$OUTPUT_FOLDER/%(title)s [%(id)s].%(ext)s" "$URL" && SUCCESS=$((SUCCESS + 1))
          done < url_list.txt
          echo "✅ Instagram: $SUCCESS/$TOTAL"

      # ============================================================
      # DIRECT DOWNLOADER
      # ============================================================
      - name: "📥 Direct Downloader"
        if: env.MODE == 'direct' && steps.parser.outputs.status == 'ok'
        run: |
          TOTAL=$URL_COUNT
          CURRENT=0
          SUCCESS=0
          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            CURRENT=$((CURRENT + 1))
            cd "$OUTPUT_FOLDER"
            FILENAME=$(basename "$URL" | cut -d'?' -f1)
            [ -z "$FILENAME" ] && FILENAME="downloaded_$CURRENT"
            wget -c --no-check-certificate --tries=10 -O "$FILENAME" "$URL" && SUCCESS=$((SUCCESS + 1))
            cd ..
          done < url_list.txt
          echo "✅ Direct: $SUCCESS/$TOTAL"

      # ============================================================
      # SPLIT LARGE FILES (فقط در حالت دانلود)
      # ============================================================
      - name: "✂️ Split Large Files"
        if: env.MODE != 'search' && steps.parser.outputs.status == 'ok'
        run: |
          LIMIT=$((90 * 1024 * 1024))
          for FILE in "$OUTPUT_FOLDER"/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
            if [ "$SIZE" -gt "$LIMIT" ]; then
              FILENAME=$(basename "$FILE")
              SAFE_NAME=$(echo "${FILENAME%.*}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g')
              mkdir -p "$OUTPUT_FOLDER/$SAFE_NAME"
              mv "$FILE" "$OUTPUT_FOLDER/$SAFE_NAME/"
              pushd "$OUTPUT_FOLDER/$SAFE_NAME" > /dev/null
              zip -r -s 90m "${SAFE_NAME}.zip" "$FILENAME" -q
              rm -f "$FILENAME"
              popd > /dev/null
            fi
          done

      # ============================================================
      # COMMIT & PUSH (شامل search results)
      # ============================================================
      - name: "📤 Commit and Push"
        if: env.OUTPUT_MODE == 'repo' && steps.parser.outputs.status != 'no_url' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add "$OUTPUT_FOLDER/"
            if [ "$MODE" = "search" ]; then
              git commit -m "🔍 Search results: ${search_keyword} [skip ci]"
            else
              git commit -m "🎬 Downloaded $URL_COUNT item(s) in $MODE mode [skip ci]"
            fi
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Committed"
          fi

      # ============================================================
      # UPLOAD ARTIFACT
      # ============================================================
      - name: "📦 Upload Artifact"
        if: env.OUTPUT_MODE == 'artifact' && steps.parser.outputs.status != 'no_url' && success()
        uses: actions/upload-artifact@v4
        with:
          name: hamechiz-${{ github.run_id }}
          path: ${{ env.OUTPUT_FOLDER }}/
          retention-days: 7

      # ============================================================
      # FINAL SUMMARY
      # ============================================================
      - name: "📊 Summary"
        if: always()
        run: |
          echo "========================================="
          echo "🍉 Hamechiz-Down v6.3 - Complete"
          echo "========================================="
          echo "Mode        : ${MODE:-N/A}"
          echo "URLs        : ${URL_COUNT:-search-mode}"
          echo "Output      : ${OUTPUT_FOLDER:-downloads}"
          echo "Status      : ${{ job.status }}"
          echo "========================================="
          
          if [ -d "$OUTPUT_FOLDER" ] && [ "$(ls -A $OUTPUT_FOLDER 2>/dev/null)" ]; then
            echo "📁 Files:"
            ls -lh "$OUTPUT_FOLDER" | grep -v "^total" | awk '{print "   📄 " $9 " (" $5 ")"}'
          fi
          echo "========================================="
